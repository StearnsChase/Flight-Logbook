services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: myflightbook
      POSTGRES_USER: myflightbook
      POSTGRES_PASSWORD: myflightbook
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myflightbook -d myflightbook"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2026-02-10T00-00-00Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: myflightbook
      MINIO_ROOT_PASSWORD: myflightbook
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "myflightbook_worker.main"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      MFB_DATABASE_URL: postgresql+asyncpg://myflightbook:myflightbook@postgres:5432/myflightbook
      MFB_REDIS_URL: redis://redis:6379/0
      MFB_WORKER_QUEUE: telemetry
      MFB_S3_ENDPOINT: http://minio:9000
      MFB_S3_BUCKET: myflightbook
      MFB_S3_ACCESS_KEY: myflightbook
      MFB_S3_SECRET_KEY: myflightbook

volumes:
  postgres-data:
  redis-data:
  minio-data:
